name: Weekly game data sync

on:
  schedule:
    # Monday 09:30 UTC — after codes sync; scan public seed & mutation lists
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-game-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run seeds & mutations community sync
        run: node scripts/sync-game-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/seeds-data.json lib/mutations-data.generated.ts lib/game-data-sync-state.json
          if git diff --staged --quiet; then
            echo "No seeds/mutations changes to commit."
            exit 0
          fi
          git commit -m "chore: weekly community seeds & mutations sync" -m "Automated multi-source scan with consensus rules; never marks data verified without overrides."
          git push
