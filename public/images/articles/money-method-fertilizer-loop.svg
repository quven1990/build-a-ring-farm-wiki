  <rect x="280" y="468" width="400" height="44" rx="22" fill="#166534"/>
  <text x="480" y="496" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#fff">Outer ring first · max soil quality · +20% ring value match</text>
