<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Pet-driven mutation upgrade path</title>
  <desc id="desc">Frozen spray base mutation upgraded by Mammoth and Hydra pets to Fire</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0ff"/>
      <stop offset="100%" stop-color="#eef6ef"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="960" height="540" rx="24" fill="url(#bg2)"/>
  <text x="480" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#1e293b">AFK Pet Mutation Loop</text>
  <text x="480" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">Gear shop Fire is rare  pets upgrade while you idle</text>

  <!-- Step 1 -->
  <rect x="60" y="130" width="200" height="120" rx="16" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <text x="160" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">1. Cheap spray</text>
  <text x="160" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28">D</text>
  <text x="160" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Frozen / any base tag</text>

  <line x1="260" y1="190" x2="310" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="310" y="110" width="340" height="160" rx="16" fill="#fff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="480" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#6d28d9">2. AFK pets (purple eggs)</text>
  <g font-family="system-ui,sans-serif">
    <rect x="340" y="168" width="130" height="80" rx="12" fill="#faf5ff"/>
    <text x="405" y="200" text-anchor="middle" font-size="24">>Ł</text>
    <text x="405" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Mammoth</text>
    <text x="405" y="244" text-anchor="middle" font-size="11" fill="#64748b">~54% / 10 min</text>

    <rect x="490" y="168" width="130" height="80" rx="12" fill="#faf5ff"/>
    <text x="555" y="200" text-anchor="middle" font-size="24">=	</text>
    <text x="555" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Hydra</text>
    <text x="555" y="244" text-anchor="middle" font-size="11" fill="#64748b">Better odds + earn</text>
  </g>

  <line x1="650" y1="190" x2="700" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="700" y="130" width="200" height="120" rx="16" fill="#fff" stroke="#fca5a5" stroke-width="2"/>
  <text x="800" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#dc2626">3. Top tags</text>
  <text x="800" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22">=% ( =}</text>
  <text x="800" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Fire · Cosmic · Alien</text>

  <!-- Compare bar -->
  <rect x="80" y="320" width="800" height="170" rx="18" fill="#fff" stroke="#e2e8f0"/>
  <text x="480" y="352" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#1e293b">Gear shop vs pet method</text>

  <text x="200" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Fire spray in ~50h play</text>
  <rect x="100" y="400" width="200" height="18" rx="9" fill="#fee2e2"/>
  <rect x="100" y="400" width="24" height="18" rx="9" fill="#ef4444"/>
  <text x="200" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#b91c1c">Unreliable</text>

  <text x="480" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Mammoth/Hydra while AFK</text>
  <rect x="380" y="400" width="200" height="18" rx="9" fill="#dcfce7"/>
  <rect x="380" y="400" width="180" height="18" rx="9" fill="#22c55e"/>
  <text x="480" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#15803d">Free · passive</text>

  <text x="760" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">Level 78 Durian + tags</text>
  <rect x="660" y="400" width="200" height="18" rx="9" fill="#fef3c7"/>
  <rect x="660" y="400" width="190" height="18" rx="9" fill="#eab308"/>
  <text x="760" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#a16207">Huge harvest $</text>
</svg>
