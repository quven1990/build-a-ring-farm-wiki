      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" rx="24" fill="url(#bg3)"/>
  <text x="480" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#1e293b">Super Fertilizer Money Loop</text>
