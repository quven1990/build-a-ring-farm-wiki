name: Weekly codes sync

on:
  schedule:
    # Monday 09:00 UTC — scan public code lists and update lib/codes-data.ts
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-codes-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run community codes sync
        run: node scripts/sync-codes.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/codes-data.ts lib/codes-sync-state.json
          if git diff --staged --quiet; then
            echo "No code list changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore: weekly community codes sync.

Automated scan of public Build A Ring Farm code lists; updates codes-data.ts and sync changelog only.
EOF
)"
          git push
