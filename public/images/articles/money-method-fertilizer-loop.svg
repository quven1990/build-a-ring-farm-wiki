    <text x="210" y="280" text-anchor="middle" font-size="32">{</text>
    <text x="210" y="312" text-anchor="middle" font-size="12" fill="#64748b">Bottom tier ’ sprays + fert</text>

    <rect x="660" y="120" width="180" height="120" rx="16" fill="#fff" stroke="#fcd34d" stroke-width="2"/>
    <text x="750" y="158" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">Super Fertilizer</text>
    <text x="750" y="190" text-anchor="middle" font-size="32">>ę</text>
    <text x="750" y="222" text-anchor="middle" font-size="12" fill="#64748b">Apply all ready plots</text>

    <rect x="660" y="320" width="180" height="120" rx="16" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
    <text x="750" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Harvest</text>
    <text x="750" y="390" text-anchor="middle" font-size="32">=°</text>
    <text x="750" y="422" text-anchor="middle" font-size="12" fill="#64748b">Sell during 15 min window</text>

    <rect x="120" y="320" width="180" height="120" rx="16" fill="#fff" stroke="#c4b5fd" stroke-width="2"/>
    <text x="210" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">Upgrades</text>
    <text x="210" y="390" text-anchor="middle" font-size="32">™</text>
    <text x="210" y="422" text-anchor="middle" font-size="12" fill="#64748b">Saw · sprinkler · soil 50%</text>
  </g>

  <!-- Curved arrows -->
  <path d="M300 250 C360 200 400 170 660 170" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <path d="M750 240 L750 320" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M660 390 C560 430 400 430 300 390" fill="none" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <path d="M210 320 L210 330" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
