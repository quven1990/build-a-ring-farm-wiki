# Deploy without Cloudflare Dashboard builds (avoids Queued build pipeline).
#
# Required repository secret: CLOUDFLARE_API_TOKEN
# Account ID is in wrangler.jsonc (account_id).

name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_ACCOUNT_ID: a17c720d27e1e3b502bef6b0d57c5472
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Cloudflare API token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing secret CLOUDFLARE_API_TOKEN."
            echo "::error::Create token: https://dash.cloudflare.com/profile/api-tokens (template: Edit Cloudflare Workers)"
            echo "::error::Add at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          # Strip accidental newlines/spaces from copy-paste in GitHub Secrets UI
          TOKEN=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "Verifying API token..."
          verify=$(curl -sS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${TOKEN}")
          echo "$verify" | head -c 500
          if ! echo "$verify" | grep -q '"success":true'; then
            echo "::error::CLOUDFLARE_API_TOKEN is invalid or expired. Create a new token and update the GitHub secret."
            exit 1
          fi
          echo "Checking Workers service API access..."
          svc=$(curl -sS -w "\n%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/services/build-a-ring-farm-wiki" \
            -H "Authorization: Bearer ${TOKEN}")
          http_code=$(echo "$svc" | tail -n1)
          body=$(echo "$svc" | sed '$d')
          echo "$body" | head -c 500
          if [ "$http_code" = "403" ] || [ "$http_code" = "401" ]; then
            echo "::error::Token cannot access Workers (HTTP ${http_code}). Use template 'Edit Cloudflare Workers' with Account Workers Scripts:Edit."
            exit 1
          fi
          if [ "$http_code" = "000" ] || echo "$body" | grep -q '"code":10000'; then
            echo "::error::Authentication failed (code 10000). Re-create token; paste only the secret string (not the permission summary)."
            exit 1
          fi
          echo "Token OK (workers/services HTTP ${http_code})."

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and deploy (OpenNext + wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          export CLOUDFLARE_API_TOKEN=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          export CLOUDFLARE_ACCOUNT_ID="${{ env.CLOUDFLARE_ACCOUNT_ID }}"
          export NEXT_PUBLIC_SITE_URL=https://buildaring.online
          pnpm run deploy

      - name: Purge Cloudflare CDN cache
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          export CLOUDFLARE_API_TOKEN=$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          ZONE=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=buildaring.online" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE" ] || [ "$ZONE" = "null" ]; then
            echo "::warning::Could not resolve zone id for buildaring.online — skip cache purge."
            exit 0
          fi
          purge=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$purge" | head -c 500
          if echo "$purge" | grep -q '"success":true'; then
            echo "CDN cache purged — HTML and /_next/static stay in sync after deploy."
          else
            echo "::warning::Cache purge failed. Add Zone → Cache Purge → Purge to your API token, or purge manually in Cloudflare dashboard."
          fi
